server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # Se o arquivo existir no sistema de arquivos, serve ele.
    # Caso contrário, serve o index.html (essencial para SPAs como React)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Regra crítica: se um arquivo na pasta /assets não for encontrado, 
    # retorna 404 em vez de redirecionar para index.html.
    # Isso evita o erro "Unexpected token '<'" no console.
    location /assets/ {
        try_files $uri =404;
    }

    # Cache de longa duração para arquivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}